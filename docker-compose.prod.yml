services:
  api:
    build: .
    command: uvicorn api.main_learning:app --host 0.0.0.0 --port 8000
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    volumes:
      - ailovanta_runtime:/app/runtime_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ailovanta_runtime:
