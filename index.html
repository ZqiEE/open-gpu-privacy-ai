<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ailovanta Chat</title>
<style>
:root{--bg:#050505;--panel:#0d0d0f;--panel2:#151518;--line:#27272a;--text:#f7f7f8;--muted:#a1a1aa;--soft:#d4d4d8;--accent:#ff4d2e;--danger:#3b1115;--ok:#22c55e;--warn:#f59e0b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,'Microsoft YaHei',sans-serif;height:100vh;overflow:hidden}.app{display:grid;grid-template-columns:300px 1fr;height:100vh}.sidebar{border-right:1px solid var(--line);background:linear-gradient(180deg,#111113,#060606);display:flex;flex-direction:column;min-width:0}.sideTop{padding:14px;border-bottom:1px solid var(--line)}.brand{font-weight:900;letter-spacing:-.02em;margin-bottom:10px}.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:5px 8px;font-size:11px;color:#ddd;margin:2px;background:#080808}.sideActions{display:grid;gap:8px;margin-top:12px}.conversationList{padding:12px;display:flex;flex-direction:column;gap:8px;overflow:auto;min-height:0}.conversationItem{border:1px solid var(--line);background:#0a0a0b;color:#e5e7eb;border-radius:12px;text-align:left;padding:10px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.conversationItem:hover,.conversationItem.active{border-color:var(--accent);background:#17100e}.sideBottom{border-top:1px solid var(--line);padding:12px}.main{display:grid;grid-template-rows:auto 1fr auto;background:radial-gradient(circle at 50% 0%,rgba(255,77,46,.11),transparent 28%),#050505;min-width:0}.topbar{height:64px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(8,8,9,.88);backdrop-filter:blur(14px)}.title{font-weight:900}.status{font-size:12px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.dot{width:8px;height:8px;border-radius:999px;background:var(--warn);display:inline-block}.dot.ok{background:var(--ok)}.messages{overflow:auto;padding:24px;scroll-behavior:smooth}.empty{max-width:760px;margin:12vh auto;text-align:center}.empty h1{font-size:42px;letter-spacing:-.05em;margin:0 0 12px}.empty p{color:var(--muted);line-height:1.7}.chips{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:18px}.chip{border:1px solid var(--line);background:#0b0b0d;color:#ddd;border-radius:999px;padding:9px 12px;cursor:pointer}.message{display:grid;grid-template-columns:40px minmax(0,760px);gap:12px;max-width:900px;margin:0 auto 22px}.avatar{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;font-weight:900;background:#1f2937}.assistant .avatar{background:linear-gradient(135deg,#ff4d2e,#8b5cf6)}.bubble{border:1px solid var(--line);border-radius:18px;padding:14px 16px;background:#101014;line-height:1.65;color:#f4f4f5;white-space:normal;overflow:hidden}.user .bubble{background:#171a23}.bubble p{margin:0 0 10px}.bubble p:last-child{margin-bottom:0}.bubble pre{background:#050506;border:1px solid #2f2f35;border-radius:14px;padding:12px;overflow:auto;color:#e5e7eb}.bubble code{font-family:Consolas,Menlo,monospace;font-size:13px}.thinking .bubble{color:var(--muted);font-style:italic}.composerWrap{border-top:1px solid var(--line);background:rgba(8,8,9,.9);padding:16px 20px 18px}.composer{max-width:900px;margin:auto;border:1px solid var(--line);background:#0f0f12;border-radius:22px;padding:10px;box-shadow:0 12px 50px rgba(0,0,0,.35)}textarea{width:100%;min-height:54px;max-height:180px;resize:none;border:0;outline:0;background:transparent;color:#fff;font:inherit;padding:8px 10px;line-height:1.55}.composerActions{display:flex;gap:8px;justify-content:space-between;align-items:center;padding:4px}.hint{font-size:12px;color:var(--muted)}button{border:1px solid var(--line);background:#111114;color:#fff;border-radius:12px;padding:10px 12px;cursor:pointer;font:inherit}button:hover{border-color:#555}.primary{background:var(--accent);border-color:var(--accent);font-weight:900}.danger{background:var(--danger);color:#fecaca}.box{border:1px solid var(--line);background:#070708;border-radius:14px;padding:10px;white-space:pre-wrap;color:#ddd;font-size:12px;line-height:1.55}.small{font-size:12px;color:var(--muted)}@media(max-width:900px){body{overflow:auto}.app{grid-template-columns:1fr;height:auto;min-height:100vh}.sidebar{height:310px;border-right:0;border-bottom:1px solid var(--line)}.messages{min-height:55vh}.message{grid-template-columns:34px 1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sideTop">
      <div class="brand">Ailovanta</div>
      <div class="small" style="color:#a1a1aa;margin:4px 0 8px 0">guest mode</div>
      <span class="badge">No login required</span><span class="badge">No payment required</span><span class="badge">Guest mode first</span>
      <div class="sideActions"><button class="primary" id="newChat">+ New chat</button><button id="refreshChats">Refresh conversations</button></div>
    </div>
    <div class="conversationList" id="conversationList">Loading...</div>
    <div class="sideBottom"><div class="box" id="guestBox"></div><button id="newGuest" style="margin-top:8px;width:100%">Reset guest id</button><button class="danger" id="clearGuestData" style="margin-top:8px;width:100%">Clear guest data</button></div>
  </aside>
  <main class="main">
    <div class="topbar"><div><div class="title">Ailovanta Chat</div><div class="small" id="chatStatus">Guest session ready.</div></div><div class="status"><span><i class="dot" id="apiDot"></i> API</span><span id="modelLabel">Model: checking</span><span id="contextLabel">Context: 0</span></div></div>
    <section class="messages" id="messages"></section>
    <div class="composerWrap"><div class="composer"><textarea id="prompt" placeholder="Message Ailovanta..."></textarea><div class="composerActions"><span class="hint">Enter to send · Shift+Enter for newline</span><div><button id="copyChat">Copy chat</button><button id="clear">Clear view</button><button class="danger" id="deleteChat">Delete chat</button><button class="primary" id="send">Send</button></div></div></div><div class="box" id="apiStatus" style="max-width:900px;margin:10px auto 0">API status: checking...</div></div>
  </main>
</div>
<script>
const $=id=>document.getElementById(id);let conversationId=localStorage.getItem('conversation_id')||null;let sending=false;
function guestId(){let id=localStorage.getItem('guest_id');if(!id){id='guest_'+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('guest_id',id)}return id}
function escapeHtml(s){return String(s).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function markdownLite(text){let safe=escapeHtml(text||'');safe=safe.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');safe=safe.replace(/`([^`]+)`/g,'<code>$1</code>');return safe.split(/\n{2,}/).map(x=>x.startsWith('<pre>')?x:'<p>'+x.replace(/\n/g,'<br>')+'</p>').join('')}
function renderGuest(){ $('guestBox').textContent=`guest_id: ${guestId()}\nconversation_id: ${conversationId||'not started'}\nmode: no login, no payment`; }
function renderEmpty(){if($('messages').children.length)return; $('messages').innerHTML=`<div class="empty"><h1>How can I help?</h1><p>Start a guest chat with no login, no payment, and persistent local conversation history.</p><div class="chips"><button class="chip" data-prompt="Explain what Ailovanta does in one paragraph.">Explain Ailovanta</button><button class="chip" data-prompt="Give me a technical roadmap for this project.">Technical roadmap</button><button class="chip" data-prompt="What should I test first in this local MVP?">Test checklist</button></div></div>`;document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{$('prompt').value=b.dataset.prompt;sendChat()})}
function clearEmpty(){const empty=document.querySelector('.empty');if(empty)empty.remove()}
function addMsg(role,text,extraClass=''){clearEmpty();const row=document.createElement('div');row.className=('message '+(role==='ai'?'assistant':'user')+' '+extraClass).trim();row.innerHTML=`<div class="avatar">${role==='ai'?'A':'U'}</div><div class="bubble"></div>`;row.querySelector('.bubble').innerHTML=markdownLite(text);$('messages').appendChild(row);$('messages').scrollTop=$('messages').scrollHeight;return row}
function setSending(v){sending=v;$('send').disabled=v;$('send').textContent=v?'Sending...':'Send'}
function resizePrompt(){const el=$('prompt');el.style.height='auto';el.style.height=Math.min(el.scrollHeight,180)+'px'}
async function checkApi(){try{const r=await fetch('/health');const b=await r.json();const m=b.local_model||{};$('apiDot').className='dot ok';$('modelLabel').textContent=`Model: ${m.model||'unknown'}`;$('apiStatus').textContent=`API status: ${b.ok?'online':'unknown'}\nModel adapter: ${m.adapter||'unknown'}\nModel: ${m.model||'unknown'}\nBase URL: ${m.base_url||'unknown'}\nMode: ${m.mode||'unknown'}\nFallback: enabled if local model is unreachable`}catch(e){$('apiDot').className='dot';$('modelLabel').textContent='Model: offline';$('apiStatus').textContent='API status: offline. Run: uvicorn api.main:app --reload'}}
async function loadConversations(){const box=$('conversationList');box.textContent='Loading...';try{const r=await fetch(`/ailovanta/v1/conversations?user_id=${encodeURIComponent(guestId())}`);const b=await r.json();const items=b.conversations||[];box.innerHTML='';if(!items.length){box.textContent='No conversations yet. Start a new guest chat.';return}items.forEach(c=>{const btn=document.createElement('button');btn.className='conversationItem '+(c.id===conversationId?'active':'');btn.textContent=c.title||c.id;btn.onclick=()=>loadConversation(c.id);box.appendChild(btn)})}catch(e){box.textContent='Could not load conversations. Start the API with: uvicorn api.main:app --reload'}}
async function loadConversation(id){conversationId=id;localStorage.setItem('conversation_id',id);$('messages').innerHTML='';try{const r=await fetch(`/ailovanta/v1/conversations/${id}/messages`);const b=await r.json();(b.messages||[]).forEach(m=>addMsg(m.role==='assistant'?'ai':'user',m.content));$('chatStatus').textContent=`Loaded ${id}`;renderGuest();loadConversations();$('prompt').focus()}catch(e){$('chatStatus').textContent='Could not load conversation.'}renderEmpty()}
async function sendChat(){const p=$('prompt').value.trim();if(!p||sending)return;addMsg('user',p);$('prompt').value='';resizePrompt();const thinking=addMsg('ai','Thinking...','thinking');$('chatStatus').textContent='Thinking...';setSending(true);try{const r=await fetch('/ailovanta/v1/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p,user_id:guestId(),conversation_id:conversationId,title:p.slice(0,30)||'Guest chat'})});const b=await r.json();if(!r.ok)throw new Error(b.detail||'Request failed');conversationId=b.conversation_id;localStorage.setItem('conversation_id',conversationId);thinking.className='message assistant';thinking.querySelector('.bubble').innerHTML=markdownLite(b.answer||'No answer returned.');$('contextLabel').textContent=`Context: ${b.context_messages_used||0}`;$('chatStatus').textContent=`Saved. Source: ${b.source||'unknown'}. Context: ${b.context_messages_used||0}`;renderGuest();loadConversations()}catch(e){thinking.className='message assistant';thinking.querySelector('.bubble').innerHTML=markdownLite('Local API is not reachable yet. Start it with: `uvicorn api.main:app --reload`');$('chatStatus').textContent=e.message}finally{setSending(false);$('prompt').focus()}}
async function deleteCurrentChat(){if(!conversationId){$('messages').innerHTML='';renderEmpty();return}try{await fetch(`/ailovanta/v1/conversations/${conversationId}`,{method:'DELETE'});conversationId=null;localStorage.removeItem('conversation_id');$('messages').innerHTML='';addMsg('ai','Conversation removed. Start a new guest chat.');renderGuest();loadConversations();$('prompt').focus()}catch(e){$('chatStatus').textContent='Could not remove conversation.'}}
async function copyCurrentChat(){if(!conversationId){$('chatStatus').textContent='Nothing to copy yet.';return}try{const r=await fetch(`/ailovanta/v1/conversations/${conversationId}/messages`);const b=await r.json();const text=(b.messages||[]).map(m=>`${m.role.toUpperCase()}: ${m.content}`).join('\n\n');await navigator.clipboard.writeText(text||'No messages.');$('chatStatus').textContent='Conversation copied to clipboard.'}catch(e){$('chatStatus').textContent='Could not copy conversation.'}}
function clearGuestData(){localStorage.removeItem('guest_id');localStorage.removeItem('conversation_id');conversationId=null;$('messages').innerHTML='';addMsg('ai','Guest data cleared. A fresh guest session is ready.');renderGuest();loadConversations();$('prompt').focus()}
$('send').onclick=sendChat;$('prompt').addEventListener('input',resizePrompt);$('prompt').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}});$('clear').onclick=()=>{$('messages').innerHTML='';renderEmpty();$('prompt').focus()};$('newChat').onclick=()=>{conversationId=null;localStorage.removeItem('conversation_id');$('messages').innerHTML='';renderEmpty();renderGuest();loadConversations();$('prompt').focus()};$('refreshChats').onclick=loadConversations;$('deleteChat').onclick=deleteCurrentChat;$('copyChat').onclick=copyCurrentChat;$('newGuest').onclick=clearGuestData;$('clearGuestData').onclick=clearGuestData;
renderGuest();checkApi();loadConversations();renderEmpty();$('prompt').focus();
</script>
</body>
</html>
