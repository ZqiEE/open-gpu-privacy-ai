name: RG

on:
  push:
  pull_request:

jobs:
  rg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements.txt
      - run: python validate.py
      - run: python -m pytest -q
      - run: python -c "from api.release_gate import release_gate; r=release_gate(core_path='.', run_tests=False); print(r['stage'])"
